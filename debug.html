<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Eval Debug Console</title>
  <style>
    body {
      font-family: monospace;
      background: #111;
      color: #0f0;
      padding: 20px;
    }

    textarea {
      width: 100%;
      height: 200px;
      background: #000;
      color: #0f0;
      border: 1px solid #0f0;
      padding: 10px;
      font-family: monospace;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      background: #0f0;
      color: #000;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    pre {
      margin-top: 15px;
      background: #000;
      padding: 10px;
      border: 1px solid #0f0;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <h2>Eval Debug Console</h2>

  <textarea id="code">// Type JavaScript here
console.log("Hello world");</textarea>

  <br>
  <button onclick="runCode()">Run eval()</button>

  <pre id="output"></pre>

  <script>
    const output = document.getElementById("output");

    function runCode() {
      const code = document.getElementById("code").value;

      try {
        const result = eval(code);
        output.textContent = "Result:\n" + result;
      } catch (err) {
        output.textContent = "Error:\n" + err;
      }
    }

    // optional: capture console.log
    const originalLog = console.log;
    console.log = function (...args) {
      output.textContent += "\n" + args.join(" ");
      originalLog.apply(console, args);
    };
  </script>

</body>
</html>
